version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: bg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barrelguard
      POSTGRES_USER: bguser
      POSTGRES_PASSWORD: bgpass123
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bguser -d barrelguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: bg_mosquitto
    restart: unless-stopped
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bg_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bguser:bgpass123@postgres:5432/barrelguard
      REDIS_URL: redis://redis:6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      SECRET_KEY: barrel-guard-secret-2024
      NUM_CAMERAS: 2
      SIM_AUTO_INJECT: "true"
      SIM_INTERVAL_MIN: 20
      SIM_INTERVAL_MAX: 60
      SNAPSHOT_DIR: /app/data/snapshots
    volumes:
      - ./data/snapshots:/app/data/snapshots
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bg_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pg_data:
